name: Build SuperWiFiDuck for lilygo-t-dongle-s3

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 master/main 时自动编译
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 缓存 PlatformIO 下载的平台、工具链和库，避免每次都重新下载
      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        run: |
          pio run -e lilygo-t-dongle-s3

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-lilygo-t-dongle-s3
          path: |
            .pio/build/lilygo-t-dongle-s3/*.bin
            .pio/build/lilygo-t-dongle-s3/*.elf
          if-no-files-found: error
