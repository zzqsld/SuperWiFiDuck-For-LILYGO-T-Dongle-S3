<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=0.8, minimal-ui">
        <meta name="theme-color" content="#36393E">

        <meta name="description" content="WiFi Duck">
        <title>WiFi Duck | 设置</title>

        <link rel="stylesheet" type="text/css" href="style.css">
        <script src="script.js"></script>
        <script src="settings.js"></script>
    </head>
  	<body>
        <nav>
            <ul class="menu">
                <li><a href="index.html">主页</a></li>
                <li><a href="settings.html">设置</a></li>
                <li><a href="terminal.html">终端</a></li>
                <li><a href="credits.html">关于</a></li>
            </ul>
        </nav>
		<div id="status"></div>
		<main>
			<section>
				<h1>WiFi 设置</h1>
				<p>修改设置后需要重启设备才能生效。</p>
				<table>
				<tr>
					<td>模式：</td>
					<td>
					<select id="mode">
						<option value="STA">STA</option>
						<option value="AP">AP</option>
					</select>
					</td>
				</tr>
				<tr>
					<td>SSID：</td>
					<td id="ssid"></td>
					<td><button class="primary" id="edit_ssid">编辑</button></td>
				</tr>
				<tr>
					<td>密码：</td>
					<td id="password"></td>
					<td><button class="primary" id="edit_password">编辑</button></td>
				</tr>
				<tr>
					<td>信道：</td>
					<td id="channel"></td>
					<td><button class="primary" id="edit_channel">编辑</button></td>
				</tr>
				<tr>
					<td>开机自动运行脚本：</td>
					<td id="autorun"></td>
					<td><button class="warn" id="disable_autorun">禁用</button></td>
				</tr>
				</table>
				<button class="danger" id="reset">恢复默认设置</button>
			</section>
			<section>
				<h1>固件更新</h1>

				<p>
					前往 <a href="https://github.com/spacehuhntech/WiFiDuck/releases" target="_blank">wifiduck.com/releases</a>
					检查更新。<br>选择 .bin 文件后点击上传即可更新设备。<br>
				</p>

				<form method='POST' action='/update' enctype='multipart/form-data'>
				<input type='file' name='update'>
				<input type='submit' class="warn" value='上传'>
				</form>
			</section>
			<footer>
				<a href="https://github.com/spacehuhntech/WiFiDuck" target="_blank">源码</a>
				<br><br>
				<span id="version"></span><br>
				Copyright (c) 2021 Spacehuhn Technologies<br>
				<a href="https://spacehuhn.com" target="_blank">spacehuhn.com</a>
			</footer>
	</body>
</html>
